<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>カテゴリ一覧</title>
</head>

<body>

  <h1>カテゴリ一覧</h1>

  <a th:href="@{/admin/categories/create}">
    カテゴリ登録
  </a>

  <form th:action="@{/admin/categories}" method="get">

    検索
    <input type="text" name="keyword" th:value="${keyword}">

    並び替え
    <select name="sort">

      <option value="id" th:selected="${sort=='id'}">
        ID
      </option>

      <option value="name" th:selected="${sort=='name'}">
        カテゴリ名
      </option>

    </select>

    <!-- ページ指定（検索・並び替え時は先頭に戻す） -->
    <input type="hidden" name="page" value="0">

    <button type="submit">
      検索
    </button>

  </form>

  <table border="1">

    <tr>
      <th>ID</th>
      <th>カテゴリ名</th>
      <th>操作</th>
    </tr>

    <tr th:each="category : ${categories}">

      <td th:text="${category.id}"></td>

      <td th:text="${category.name}"></td>

      <td>

        <a th:href="@{/admin/categories/{id}/edit(id=${category.id})}">
          編集
        </a>

        <form th:action="@{/admin/categories/{id}/delete(id=${category.id})}" method="post" style="display:inline"
          onsubmit="return confirm('このカテゴリを削除しますか？')">

          <button type="submit">
            削除
          </button>

        </form>

      </td>

    </tr>

  </table>

  <!-- ページング -->
  <div>
    <span th:text="'ページ ' + (${categories.number}+1) + ' / ' + ${categories.totalPages}"></span>

    <span th:if="${categories.hasPrevious()}">
      <a th:href="@{/admin/categories(keyword=${keyword},sort=${sort},page=${categories.number-1})}">前へ</a>
    </span>

    <span th:if="${categories.hasNext()}">
      <a th:href="@{/admin/categories(keyword=${keyword},sort=${sort},page=${categories.number+1})}">次へ</a>
    </span>

    <span th:each="i : ${#numbers.sequence(0, categories.totalPages-1)}">
      <a th:href="@{/admin/categories(keyword=${keyword},sort=${sort},page=${i})}"
         th:text="${i+1}"
         th:classappend="${i==categories.number} ? 'current' : ''"></a>
    </span>
  </div>

  <br>
  <form th:action="@{/logout}" method="post" style="margin-top: 20px;">
    <button type="submit">ログアウト</button>
  </form>

</body>

</html>

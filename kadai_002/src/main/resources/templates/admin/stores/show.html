<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8">
  <title>店舗詳細</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

  <div th:insert="~{/layout/header :: header}"></div>

  <div class="main-content">

  <h2 class="page-title">店舗詳細</h2>

  <table class="info-table">

    <tr>
      <th>ID</th>
      <td th:text="${store.id}"></td>
    </tr>

    <tr>
      <th>店舗名</th>
      <td th:text="${store.name}"></td>
    </tr>

    <tr>
      <th>住所</th>
      <td th:text="${store.address}"></td>
    </tr>

    <tr>
      <th>説明</th>
      <td th:text="${store.description}"></td>
    </tr>

    <tr>
      <th>最低価格</th>
      <td th:text="${store.minPrice}"></td>
    </tr>

    <tr>
      <th>最高価格</th>
      <td th:text="${store.maxPrice}"></td>
    </tr>

  </table>

    <!-- 画像表示 -->
  <img th:if="${store.imagePath}" th:src="@{/storage/__${store.imagePath}__}" alt="店舗画像" class="store-hero">
  <img th:unless="${store.imagePath}" th:src="@{/images/noImage.png}" alt="NO IMAGE" class="store-hero">

  <br>

  <a th:href="@{/admin/stores/{id}/edit(id=${store.id})}" class="btn-primary">
    編集
  </a>

  <form th:action="@{/admin/stores/{id}/delete(id=${store.id})}" method="post" style="display:inline"
    onsubmit="return confirm('この店舗を削除しますか？')">

    <button type="submit" class="btn-secondary">
      削除
    </button>

  </form>

  <br><br>

  <a th:href="@{/admin/stores}" class="back-link">
    一覧に戻る
  </a>

  </div>

</body>

</html>

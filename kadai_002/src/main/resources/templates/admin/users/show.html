<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>会員詳細</title>
</head>

<body>

  <h1>会員詳細</h1>

  <table border="1">

    <tr>
      <th>ID</th>
      <td th:text="${user.id}"></td>
    </tr>

    <tr>
      <th>名前</th>
      <td th:text="${user.name}"></td>
    </tr>

    <tr>
      <th>メール</th>
      <td th:text="${user.email}"></td>
    </tr>

    <tr>
      <th>会員種別</th>
      <td th:text="${user.membershipType == 'PREMIUM'} ? '有料会員' : '無料会員'"></td>
    </tr>

    <tr>
      <th>権限</th>
      <td th:text="${user.role == 'ADMIN'} ? '管理者' : '一般会員'"></td>
    </tr>

  </table>

  <a th:href="@{/admin/users/{id}/edit(id=${user.id})}">
    編集
  </a>

  <br><br>

  <a th:href="@{/admin/users}">
    一覧に戻る
  </a>

  <br>
  <form th:action="@{/logout}" method="post" style="margin-top: 20px;">
    <button type="submit">ログアウト</button>
  </form>

</body>

</html>

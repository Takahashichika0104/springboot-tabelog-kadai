<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>ログイン</title>
</head>

<body>

  <h1>ログイン</h1>

  <div th:if="${successMessage}" style="color: green; border: 1px solid green; padding: 10px; margin-bottom: 20px;">
    <p th:text="${successMessage}"></p>
  </div>

  <div th:if="${errorMessage}" style="color: red; border: 1px solid red; padding: 10px; margin-bottom: 20px;">
    <p th:text="${errorMessage}"></p>
  </div>

  <form th:action="@{/login}" method="post">

    <div>
      <label>メールアドレス</label>
      <input type="email" name="username">
    </div>

    <div>
      <label>パスワード</label>
      <input type="password" name="password">
    </div>

    <button type="submit">
      ログイン
    </button>

  </form>

  <p>
    <a th:href="@{/password-reset/request}">パスワードを忘れた方はこちら</a>
  </p>

  <a th:href="@{/register}">
    会員登録はこちら
  </a>

</body>

</html>

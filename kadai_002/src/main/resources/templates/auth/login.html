<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>ログイン</title>
</head>

<body>

  <h1>ログイン</h1>

  <form th:action="@{/login}" method="post">

    <div>
      <label>メールアドレス</label>
      <input type="email" name="username">
    </div>

    <div>
      <label>パスワード</label>
      <input type="password" name="password">
    </div>

    <button type="submit">
      ログイン
    </button>

  </form>

  <a th:href="@{/register}">
    会員登録はこちら
  </a>

</body>

</html>

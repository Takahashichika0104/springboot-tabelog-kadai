<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>パスワード再設定メール送信</title>
</head>

<body>

  <h1>パスワード再設定</h1>

  <p>登録済みのメールアドレスを入力してください。再設定ページへのリンクを送信します。</p>

  <form th:action="@{/password-reset/request}" method="post">
    <div>
      <label>メールアドレス</label>
      <input type="email" name="email" required>
    </div>

    <button type="submit">再設定メールを送信</button>
  </form>

  <a th:href="@{/login}">ログインへ戻る</a>

</body>

</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8">
  <title>パスワード再設定メール送信</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:insert="~{layout/header :: header}"></div>

<div class="main-content">
  <h2 class="page-title">パスワード再設定</h2>

  <p>登録済みのメールアドレスを入力してください。再設定ページへのリンクを送信します。</p>

  <form th:action="@{/password-reset/request}" method="post" class="form-group">
    <div>
      <label>メールアドレス</label>
      <input type="email" name="email" required>
    </div>

    <button type="submit" class="btn-primary">再設定メールを送信</button>
  </form>

  <a th:href="@{/login}" class="back-link">ログインへ戻る</a>
</div>

</body>

</html>

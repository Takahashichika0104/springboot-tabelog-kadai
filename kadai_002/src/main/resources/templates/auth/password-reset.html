<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8">
  <title>パスワード再設定</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:insert="~{layout/header :: header}"></div>

<div class="main-content">
  <h2 class="page-title">新しいパスワードの設定</h2>

  <form th:action="@{/password-reset(token=${token})}" th:object="${passwordResetForm}" method="post" class="form-group">
    <div>
      <label>新しいパスワード</label>
      <input type="password" th:field="*{password}">
      <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color: red;"></span>
    </div>

    <div>
      <label>新しいパスワード（確認）</label>
      <input type="password" th:field="*{passwordConfirmation}">
      <span th:if="${#fields.hasErrors('passwordConfirmation')}" th:errors="*{passwordConfirmation}" style="color: red;"></span>
    </div>

    <button type="submit" class="btn-primary">パスワードを更新</button>
  </form>

  <a th:href="@{/login}" class="back-link">ログインへ戻る</a>
</div>

</body>

</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>パスワード再設定</title>
</head>

<body>

  <h1>新しいパスワードの設定</h1>

  <form th:action="@{/password-reset(token=${token})}" th:object="${passwordResetForm}" method="post">
    <div>
      <label>新しいパスワード</label>
      <input type="password" th:field="*{password}">
      <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color: red;"></span>
    </div>

    <div>
      <label>新しいパスワード（確認）</label>
      <input type="password" th:field="*{passwordConfirmation}">
      <span th:if="${#fields.hasErrors('passwordConfirmation')}" th:errors="*{passwordConfirmation}" style="color: red;"></span>
    </div>

    <button type="submit">パスワードを更新</button>
  </form>

  <a th:href="@{/login}">ログインへ戻る</a>

</body>

</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>お気に入り一覧</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:insert="~{layout/header :: header}"></div>

<div class="main-content">

<h2 class="page-title">お気に入り一覧</h2>

<table class="info-table">
    <tr>
        <th>店舗名</th>
        <th>詳細</th>
    </tr>

    <tr th:each="favorite : ${favoritePage.content}">
        <td th:text="${favorite.store.name}"></td>
        <td>
            <a th:href="@{/stores/{id}(id=${favorite.store.id})}">
                詳細
            </a>
        </td>
    </tr>
</table>

<!-- ページネーション -->
<div class="pagination">
    <a th:if="${favoritePage.hasPrevious()}"
       th:href="@{/favorites(page=${favoritePage.number - 1})}">
        前へ
    </a>

    <span th:text="${favoritePage.number + 1}"></span>

    <a th:if="${favoritePage.hasNext()}"
       th:href="@{/favorites(page=${favoritePage.number + 1})}">
        次へ
    </a>
</div>

</div>

</body>
</html>

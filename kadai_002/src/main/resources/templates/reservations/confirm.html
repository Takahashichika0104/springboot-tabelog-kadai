<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8">
  <title>予約確認</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

  <div th:insert="~{/layout/header :: header}"></div>

  <div class="main-content">

    <h2 class="page-title">予約確認</h2>

    <p>店舗：<span th:text="${reservation.store.name}"></span></p>

    <p>日時：<span th:text="${reservation.reservedAt}"></span></p>

    <p>人数：<span th:text="${reservation.numberOfPeople}"></span></p>

    <form th:action="@{/reservations/create}" method="post" th:object="${reservation}">

      <input type="hidden" th:field="*{store.id}">
      <input type="hidden" th:field="*{reservedAt}">
      <input type="hidden" th:field="*{numberOfPeople}">

      <button type="submit" class="btn-primary">予約確定</button>

    </form>

  </div>

</body>

</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>レビュー編集</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:insert="~{/layout/header :: header}"></div>

<div class="main-content">
    <h2 class="page-title" th:text="${store.name} + ' のレビュー編集'"></h2>

    <form th:action="@{/reviews/update}" method="post"
          th:object="${review}" class="form-group">

        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:field="*{store.id}">

        <div>
            <label>評価</label>
            <input type="number" th:field="*{rating}" min="1" max="5">
        </div>

        <div>
            <label>コメント</label>
            <textarea th:field="*{comment}"></textarea>
        </div>

        <button type="submit" class="btn-primary">更新</button>

    </form>
</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8">
  <title>店舗一覧</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

  <div th:insert="~{/layout/header :: header}"></div>

  <div class="main-content">

    <h1 class="page-title">店舗一覧</h1>

    <form method="get" class="search-box">

      <div class="form-group">
        <label>店舗名</label>
        <input type="text" name="keyword" th:value="${keyword}">
      </div>

      <div class="form-group">
        <label>カテゴリ</label>
        <select name="categoryId">
          <option value="">すべて</option>
          <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
        </select>
      </div>

      <div class="form-group price-range">
        <label>予算</label>
        <div style="display: flex; gap: 6px; align-items: center;">
          <input type="number" name="priceMin" placeholder="最小">
          <span>〜</span>
          <input type="number" name="priceMax" placeholder="最大">
        </div>
      </div>

      <button type="submit" class="btn-search">検索</button>

    </form>

    <p class="result-count" th:if="${stores != null && stores.content != null}">
      <span th:text="${stores.totalElements}"></span>件の店舗が見つかりました
    </p>

    <div class="store-grid">

      <div class="store-card" th:each="store : ${stores.content}">

        <!-- 画像表示 -->
        <img th:if="${store.imagePath}" th:src="@{/storage/__${store.imagePath}__}" alt="店舗画像" class="store-card__img">
        <img th:unless="${store.imagePath}" th:src="@{/images/noImage.png}" alt="NO IMAGE" class="store-card__img">

        <div class="store-card__body">

          <div class="store-card__header">
            <h3 class="store-card__name" th:text="${store.name}"></h3>
          </div>

          <p class="store-card__meta">
            <span th:text="${store.category != null ? store.category.name : '未分類'}"></span>
            <span th:text="${store.address}"></span>
          </p>

          <p class="store-card__price">
            ¥ <span th:text="${store.minPrice + '〜' + store.maxPrice}"></span>
          </p>

          <a th:href="@{/stores/{id}(id=${store.id})}" class="btn-detail">詳細を見る</a>

        </div>

      </div>

    </div>

    <!-- ページネーション -->
    <div class="pagination" th:if="${stores != null && stores.getTotalPages() > 1}">
      <a th:if="${stores.hasPrevious()}" th:href="@{/stores(page=${stores.getNumber() - 1}, keyword=${keyword}, categoryId=${categoryId}, priceMin=${priceMin}, priceMax=${priceMax})}">
        前へ
      </a>

      <span th:each="i : ${#numbers.sequence(0, stores.getTotalPages() - 1)}">
        <span th:if="${i == stores.getNumber()}" class="current" th:text="${i + 1}"></span>
        <a th:if="${i != stores.getNumber()}" th:href="@{/stores(page=${i}, keyword=${keyword}, categoryId=${categoryId}, priceMin=${priceMin}, priceMax=${priceMax})}" th:text="${i + 1}"></a>
      </span>

      <a th:if="${stores.hasNext()}" th:href="@{/stores(page=${stores.getNumber() + 1}, keyword=${keyword}, categoryId=${categoryId}, priceMin=${priceMin}, priceMax=${priceMax})}">
        次へ
      </a>
    </div>

  </div>

</body>

</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title th:text="${store.name}"></title>
</head>

<body>

  <h1 th:text="${store.name}"></h1>

  <!-- お気に入りボタン -->
  <form th:action="@{/favorites/toggle/{id}(id=${store.id})}" method="post">

    <button type="submit" style="font-size: 24px; border: none; background: none;">

      <span th:if="${isFavorite}">❤️</span>
      <span th:unless="${isFavorite}">🤍</span>

    </button>

  </form>

  <p th:text="${store.description}"></p>

  <p>

    住所:
    <span th:text="${store.address}"></span>

  </p>

  <p>

    カテゴリ:
    <span th:text="${store.category != null ? store.category.name : '未分類'}"></span>

  </p>

  <p>

    価格帯:
    ¥ <span th:text="${store.minPrice + '円〜' + store.maxPrice + '円'}"></span>


  </p>

  <!-- 画像表示 -->
  <img th:if="${store.imagePath}" th:src="@{/storage/__${store.imagePath}__}" alt="店舗画像">
  <img th:unless="${store.imagePath}" th:src="@{/images/noImage.png}" alt="NO IMAGE">


  <br><br>

  <h3>予約</h3>

  <div th:if="${#authentication.principal.user.membershipType == 'PREMIUM'}">

    <form th:action="@{/reservations/confirm}" method="post" th:object="${reservation}">

      <input type="hidden" th:field="*{store.id}" th:value="${store.id}">

      <div>
        <label>予約日時</label>
        <input type="datetime-local" th:field="*{reservedAt}">
      </div>

      <div>
        <label>人数</label>
        <input type="number" th:field="*{numberOfPeople}">
      </div>

      <button type="submit">予約確認</button>

    </form>

  </div>

  <div th:unless="${#authentication.principal.user.membershipType == 'PREMIUM'}">

    <p>予約するにはプレミアム会員になる必要があります</p>

  </div>

  <hr>

  <h2>レビュー</h2>

  <!-- レビュー投稿ボタン -->

  <div th:if="${#authentication.principal.user.membershipType == 'PREMIUM'}">

    <a th:href="@{/reviews/create/{id}(id=${store.id})}">
      レビューを投稿する
    </a>

  </div>

  <div th:unless="${#authentication.principal.user.membershipType == 'PREMIUM'}">
    <p>レビュー投稿はプレミアム会員限定です</p>
  </div>

  <table>

    <tr>
      <th>ユーザー</th>
      <th>評価</th>
      <th>コメント</th>
      <th>操作</th>
    </tr>

    <tr th:each="review : ${reviews}">

      <td th:text="${review.user.name}"></td>

      <td th:text="${review.rating}"></td>

      <td th:text="${review.comment}"></td>

      <!-- ★追加：自分の投稿のみ操作表示 -->
      <td>
        <div th:if="${#authentication.principal.user.id == review.user.id}">

          <!-- 編集 -->
          <a th:href="@{/reviews/edit/{id}(id=${review.id})}">
            編集
          </a>

          <!-- 削除 -->
          <button type="button" th:attr="data-id=${review.id}" onclick="openModal(this)">
            削除
          </button>

        </div>
      </td>

    </tr>

  </table>

  <!-- 削除確認モーダル -->
  <div id="deleteModal"
    style="display:none; position:fixed; top:30%; left:40%; background:white; padding:20px; border:1px solid black;">

    <p>本当に削除しますか？</p>

    <form id="deleteForm" method="post">

      <!-- CSRF対策 -->
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

      <button type="submit">削除する</button>
    </form>

    <button onclick="closeModal()">キャンセル</button>

  </div>

  <!-- モーダル制御JS -->
  <script>
    function openModal(button) {
      const reviewId = button.getAttribute("data-id");
      const form = document.getElementById("deleteForm");

      form.action = "/reviews/delete/" + reviewId;

      document.getElementById("deleteModal").style.display = "block";
    }

    function closeModal() {
      document.getElementById("deleteModal").style.display = "none";
    }
  </script>

  <br>
  <form th:action="@{/logout}" method="post" style="margin-top: 20px;">
    <button type="submit">ログアウト</button>
  </form>

</body>

</html>

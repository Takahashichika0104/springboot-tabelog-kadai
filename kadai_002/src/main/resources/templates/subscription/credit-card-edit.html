<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>クレジットカード情報編集</title>
</head>

<body>

  <h1>クレジットカード情報編集</h1>

  <div th:if="${successMessage}" style="color: green; border: 1px solid green; padding: 10px; margin-bottom: 20px;">
    <p th:text="${successMessage}"></p>
  </div>

  <div th:if="${errorMessage}" style="color: red; border: 1px solid red; padding: 10px; margin-bottom: 20px;">
    <p th:text="${errorMessage}"></p>
  </div>

  <p>登録済みのクレジットカード情報を更新します。</p>

  <p>Stripeの安全な画面でクレジットカード情報を編集します。</p>

  <form th:action="@{/credit-card/edit/portal}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    <button type="submit">Stripeでカード情報を編集する</button>
  </form>

  <br>
  <a th:href="@{/member-menu}">会員メニューへ戻る</a>

  <br>
  <form th:action="@{/logout}" method="post" style="margin-top: 20px;">
    <button type="submit">ログアウト</button>
  </form>

</body>

</html>

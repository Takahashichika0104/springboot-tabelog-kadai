<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8">
  <title>クレジットカード情報編集</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

  <div th:insert="~{layout/header :: header}"></div>

  <div class="main-content">

    <h1 class="page-title">クレジットカード情報編集</h1>

    <div th:if="${successMessage}" style="color: green; border: 1px solid green; padding: 10px; margin-bottom: 20px;">
      <p th:text="${successMessage}"></p>
    </div>

    <div th:if="${errorMessage}" style="color: red; border: 1px solid red; padding: 10px; margin-bottom: 20px;">
      <p th:text="${errorMessage}"></p>
    </div>

    <p>登録済みのクレジットカード情報を更新します。</p>

    <p>Stripeの安全な画面でクレジットカード情報を編集します。</p>

    <form th:action="@{/credit-card/edit/portal}" method="post" class="form-group">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <button type="submit" class="btn-primary">Stripeでカード情報を編集する</button>
    </form>

    <br>
    <a th:href="@{/member-menu}" class="back-link">会員メニューへ戻る</a>

  </div>

</body>

</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8">
  <title>会員情報編集</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

  <div th:insert="~{layout/header :: header}"></div>

  <div class="main-content">

  <h1 class="page-title">会員情報編集</h1>

  <div th:if="${errorMessage}" style="color: red; border: 1px solid red; padding: 10px; margin-bottom: 20px;">
    <p th:text="${errorMessage}"></p>
  </div>

  <div th:if="${successMessage}" style="color: green; border: 1px solid green; padding: 10px; margin-bottom: 20px;">
    <p th:text="${successMessage}"></p>
  </div>

  <form th:action="@{/users/update}" th:object="${user}" method="post" class="section-block">
    <div th:if="${#fields.hasErrors('*')}" style="color: red;">
      <h3>以下のエラーがあります：</h3>
      <ul>
        <li th:each="err : ${#fields.allErrors()}" th:text="${err}"></li>
      </ul>
    </div>

    <div class="form-group">
      <label>名前</label>
      <input type="text" th:field="*{name}">
      <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color: red;"></span>
    </div>

    <div class="form-group">
      <label>メールアドレス</label>
      <input type="email" th:field="*{email}">
      <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color: red;"></span>
      <p style="color: orange; font-size: 12px;">※メールアドレスを変更する場合、再度メール認証が必要になります</p>
    </div>

    <div class="form-group">
      <label>パスワード</label>
      <input type="password" th:field="*{password}">
      <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color: red;"></span>
    </div>

    <button type="submit" class="btn-primary">
      更新
    </button>

  </form>

  <br>

  <a th:href="@{/mypage}" class="back-link">
    マイページへ戻る
  </a>

  </div>

</body>

</html>

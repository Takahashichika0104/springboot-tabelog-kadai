<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <meta charset="UTF-8">
  <title>会員メニュー</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

  <div th:insert="~{/layout/header :: header}"></div>

  <div class="main-content">

    <div class="menu-card">
      <h2>会員メニュー</h2>
      <ul class="menu-list">
        <li>
          <a th:href="@{/mypage}">会員情報確認</a>
        </li>
        <li>
          <a th:href="@{/users/edit}">会員情報編集</a>
        </li>
        <li th:if="${user.membershipType == 'FREE'}">
          <a th:href="@{/membership}">有料会員登録（Stripe）</a>
        </li>
        <li th:if="${user.membershipType == 'PREMIUM'}">
          <a th:href="@{/membership/cancel}">有料会員解約（Stripe）</a>
        </li>
        <li th:if="${user.membershipType == 'PREMIUM'}">
          <a th:href="@{/credit-card/edit}">クレジットカード情報編集（Stripe）</a>
        </li>
        <li>
          <a th:href="@{/reservations}">予約一覧</a>
        </li>
        <li>
          <a th:href="@{/favorites}">お気に入り一覧</a>
        </li>
      </ul>
    </div>

    <div style="display: flex; gap: 12px; align-items: center; padding: 20px 0;">
      <a th:href="@{/stores}" class="back-link">トップへ戻る</a>
      <form th:action="@{/logout}" method="post" style="margin: 0;">
        <button type="submit" class="btn-primary">ログアウト</button>
      </form>
    </div>

  </div>

</body>

</html>
